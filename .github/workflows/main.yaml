name: Convert Notion to Markdown

on:
  pull_request:
    branches:
      - action
  schedule:
    - cron: "0 14 * * *" # 매일 오후 11시에 수행

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm install axios notion-to-md
          npm ci

      - name: Update README and operate/*.md
        env:
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        run: |
          node update_readme.js
          node convert.js
        
      - name: Check if there are any changes
        id: verify_diff
        run: |
          git diff --exit-code -- README.md operate/*.md images/* || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push the markdown file
        if: steps.verify_diff.outputs.changed =='true'
        run: |
          git config --global user.name '5a6io'
          git config --global user.email '${{ secrets.EMAIL }}'
          git status
          git add .
          git commit -m "Update Notion page to markdown"
          git push -u origin main